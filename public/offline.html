<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISE — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0A;
      color: #F0F0F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 2.5rem; font-weight: 700; color: #FF6B35; letter-spacing: 0.2em; }
    p { color: #8A8A8A; font-size: 0.9rem; max-width: 300px; line-height: 1.6; }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      background: #FF6B35;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>RISE</h1>
  <p>You're offline. Please check your internet connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
